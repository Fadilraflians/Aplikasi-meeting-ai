<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Date Parsing Fix</title>
</head>
<body>
    <h1>Test Date Parsing Fix untuk AI Booking</h1>
    
    <div id="test-results"></div>
    
    <script>
        function testDateParsingFix() {
            const results = document.getElementById('test-results');
            let html = '<h2>Test Results:</h2>';
            
            // Test current date
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            html += '<h3>Current Date Info:</h3>';
            html += '<p>Now: ' + now.toString() + '</p>';
            html += '<p>Today: ' + today.toString() + '</p>';
            html += '<p>Today ISO: ' + today.toISOString().slice(0, 10) + '</p>';
            html += '<p>Current Date: ' + now.getDate() + '</p>';
            html += '<p>Current Month: ' + (now.getMonth() + 1) + '</p>';
            html += '<p>Current Year: ' + now.getFullYear() + '</p>';
            
            // Test "besok" parsing dengan fix baru
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            html += '<h3>Besok Parsing (Fixed):</h3>';
            html += '<p>Tomorrow: ' + tomorrow.toString() + '</p>';
            html += '<p>Tomorrow ISO: ' + tomorrow.toISOString().slice(0, 10) + '</p>';
            html += '<p>Tomorrow Date: ' + tomorrow.getDate() + '</p>';
            html += '<p>Tomorrow Month: ' + (tomorrow.getMonth() + 1) + '</p>';
            html += '<p>Tomorrow Year: ' + tomorrow.getFullYear() + '</p>';
            
            // Test "lusa" parsing dengan fix baru
            const dayAfterTomorrow = new Date(today);
            dayAfterTomorrow.setDate(today.getDate() + 2);
            html += '<h3>Lusa Parsing (Fixed):</h3>';
            html += '<p>Day After Tomorrow: ' + dayAfterTomorrow.toString() + '</p>';
            html += '<p>Day After Tomorrow ISO: ' + dayAfterTomorrow.toISOString().slice(0, 10) + '</p>';
            html += '<p>Day After Tomorrow Date: ' + dayAfterTomorrow.getDate() + '</p>';
            html += '<p>Day After Tomorrow Month: ' + (dayAfterTomorrow.getMonth() + 1) + '</p>';
            html += '<p>Day After Tomorrow Year: ' + dayAfterTomorrow.getFullYear() + '</p>';
            
            // Test edge cases
            html += '<h3>Edge Cases:</h3>';
            
            // Test end of month
            const endOfMonth = new Date(2025, 0, 31); // January 31, 2025
            const nextDay = new Date(endOfMonth);
            nextDay.setDate(endOfMonth.getDate() + 1);
            html += '<p>End of month test (Jan 31 + 1 day): ' + nextDay.toISOString().slice(0, 10) + '</p>';
            
            // Test leap year
            const leapYear = new Date(2024, 1, 28); // Feb 28, 2024 (leap year)
            const nextDayLeap = new Date(leapYear);
            nextDayLeap.setDate(leapYear.getDate() + 1);
            html += '<p>Leap year test (Feb 28 + 1 day): ' + nextDayLeap.toISOString().slice(0, 10) + '</p>';
            
            // Test year boundary
            const endOfYear = new Date(2024, 11, 31); // Dec 31, 2024
            const nextDayYear = new Date(endOfYear);
            nextDayYear.setDate(endOfYear.getDate() + 1);
            html += '<p>Year boundary test (Dec 31 + 1 day): ' + nextDayYear.toISOString().slice(0, 10) + '</p>';
            
            results.innerHTML = html;
        }
        
        // Run test when page loads
        testDateParsingFix();
    </script>
</body>
</html>
