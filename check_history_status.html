<!DOCTYPE html>
<html>
<head>
    <title>Check History Status</title>
</head>
<body>
    <h1>Check History Status</h1>
    <div id="output"></div>

    <script>
        // Check current history
        function checkHistory() {
            const history = JSON.parse(localStorage.getItem('booking_history') || '[]');
            
            let output = '<h2>Current History Entries:</h2>';
            output += `<p><strong>Total entries:</strong> ${history.length}</p>`;
            
            if (history.length === 0) {
                output += '<p style="color: orange;">No history entries found. Meeting expired may not have been moved yet.</p>';
            } else {
                output += '<table border="1" style="border-collapse: collapse; width: 100%;">';
                output += '<tr><th>ID</th><th>Topic</th><th>Room</th><th>Date</th><th>Time</th><th>Status</th><th>Source</th><th>Completed At</th></tr>';
                
                history.forEach((entry, index) => {
                    const color = entry.status === 'expired' ? 'red' : (entry.status === 'Selesai' ? 'green' : 'orange');
                    const completedAt = entry.completedAt ? new Date(entry.completedAt).toLocaleString('id-ID') : 'N/A';
                    
                    output += `<tr>`;
                    output += `<td>${entry.id}</td>`;
                    output += `<td>${entry.topic}</td>`;
                    output += `<td>${entry.roomName}</td>`;
                    output += `<td>${entry.date}</td>`;
                    output += `<td>${entry.time}${entry.endTime ? ' - ' + entry.endTime : ''}</td>`;
                    output += `<td style="color: ${color}; font-weight: bold;">${entry.status}</td>`;
                    output += `<td>${entry.source || 'unknown'}</td>`;
                    output += `<td>${completedAt}</td>`;
                    output += `</tr>`;
                });
                output += '</table>';
            }
            
            // Check for expired bookings that should be in history
            const expectedExpired = [
                { id: 96, topic: 'teess', date: '2025-09-12', time: '00:22', endTime: '01:22' },
                { id: 1, topic: 'teess', date: '2025-09-12', time: '00:22', endTime: '01:22' }
            ];
            
            output += '<h2>Expected Expired Bookings:</h2>';
            expectedExpired.forEach(expected => {
                const found = history.find(entry => 
                    entry.topic === expected.topic && 
                    entry.date === expected.date && 
                    entry.status === 'expired'
                );
                
                if (found) {
                    output += `<p style="color: green;">✓ Found: ${expected.topic} (ID: ${found.id}) - Status: ${found.status}</p>`;
                } else {
                    output += `<p style="color: red;">✗ Missing: ${expected.topic} - Should be expired</p>`;
                }
            });
            
            document.getElementById('output').innerHTML = output;
        }

        // Add button to refresh
        const refreshButton = document.createElement('button');
        refreshButton.textContent = 'Refresh History Check';
        refreshButton.onclick = checkHistory;
        refreshButton.style.margin = '10px';
        refreshButton.style.padding = '10px 20px';
        refreshButton.style.backgroundColor = '#28a745';
        refreshButton.style.color = 'white';
        refreshButton.style.border = 'none';
        refreshButton.style.borderRadius = '5px';
        refreshButton.style.cursor = 'pointer';
        
        document.body.appendChild(refreshButton);

        // Initial check
        checkHistory();
    </script>
</body>
</html>
