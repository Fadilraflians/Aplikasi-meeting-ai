<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Date Parsing</title>
</head>
<body>
    <h1>Test Date Parsing untuk AI Booking</h1>
    
    <div id="test-results"></div>
    
    <script>
        function testDateParsing() {
            const results = document.getElementById('test-results');
            let html = '<h2>Test Results:</h2>';
            
            // Test current date
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            html += '<h3>Current Date Info:</h3>';
            html += '<p>Now: ' + now.toString() + '</p>';
            html += '<p>Today: ' + today.toString() + '</p>';
            html += '<p>Today ISO: ' + today.toISOString().slice(0, 10) + '</p>';
            
            // Test "besok" parsing
            const tomorrow = new Date(today.getTime() + 24 * 60 * 60 * 1000);
            html += '<h3>Besok Parsing:</h3>';
            html += '<p>Tomorrow: ' + tomorrow.toString() + '</p>';
            html += '<p>Tomorrow ISO: ' + tomorrow.toISOString().slice(0, 10) + '</p>';
            
            // Test "lusa" parsing
            const dayAfterTomorrow = new Date(today.getTime() + 2 * 24 * 60 * 60 * 1000);
            html += '<h3>Lusa Parsing:</h3>';
            html += '<p>Day After Tomorrow: ' + dayAfterTomorrow.toString() + '</p>';
            html += '<p>Day After Tomorrow ISO: ' + dayAfterTomorrow.toISOString().slice(0, 10) + '</p>';
            
            // Test time parsing
            html += '<h3>Time Parsing Test:</h3>';
            const testTimes = ['11:00', '09:00', '14:30'];
            testTimes.forEach(time => {
                const [hours, minutes] = time.split(':').map(Number);
                const endHours = hours + 1; // 1 hour duration
                const endTime = `${endHours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
                html += `<p>Start: ${time} → End: ${endTime} (1 hour duration)</p>`;
            });
            
            // Test meeting type
            html += '<h3>Meeting Type Test:</h3>';
            html += '<p>Internal: internal</p>';
            html += '<p>Eksternal: external</p>';
            
            results.innerHTML = html;
        }
        
        // Run test on page load
        testDateParsing();
    </script>
</body>
</html>
