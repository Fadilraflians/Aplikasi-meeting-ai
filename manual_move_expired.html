<!DOCTYPE html>
<html>
<head>
    <title>Manual Move Expired to History</title>
</head>
<body>
    <h1>Manual Move Expired to History</h1>
    <div id="output"></div>

    <script>
        // Simulate the expired booking data from the PHP script
        const expiredBookings = [
            {
                id: 96,
                topic: 'teess',
                date: '2025-09-12',
                time: '00:22',
                endTime: '01:22',
                roomName: 'Unknown Room',
                pic: 'dil',
                participants: 10,
                source: 'ai'
            }
        ];

        // Function to add to history (same as in ReservationsPage)
        function addHistory(entry) {
            const list = JSON.parse(localStorage.getItem('booking_history') || '[]');
            const saved = { ...entry, savedAt: new Date().toISOString() };
            list.unshift(saved);
            const trimmed = list.slice(0, 200);
            localStorage.setItem('booking_history', JSON.stringify(trimmed));
        }

        // Move expired bookings to history
        function moveExpiredToHistory() {
            expiredBookings.forEach(booking => {
                const historyEntry = {
                    id: booking.id,
                    roomName: booking.roomName,
                    topic: booking.topic,
                    date: booking.date,
                    time: booking.time,
                    endTime: booking.endTime,
                    pic: booking.pic,
                    participants: booking.participants,
                    status: 'expired',
                    completedAt: new Date().toISOString(),
                    source: booking.source
                };
                
                addHistory(historyEntry);
                console.log('Moved expired booking to history:', booking.topic);
            });
            
            alert('Expired bookings moved to history! Check History page.');
        }

        // Display current history
        function displayHistory() {
            const history = JSON.parse(localStorage.getItem('booking_history') || '[]');
            let output = '<h2>Current History:</h2>';
            
            if (history.length === 0) {
                output += '<p>No history entries found.</p>';
            } else {
                output += '<table border="1" style="border-collapse: collapse; width: 100%;">';
                output += '<tr><th>ID</th><th>Topic</th><th>Room</th><th>Date</th><th>Time</th><th>Status</th><th>Source</th></tr>';
                
                history.forEach(entry => {
                    const color = entry.status === 'expired' ? 'red' : (entry.status === 'Selesai' ? 'green' : 'orange');
                    output += `<tr>`;
                    output += `<td>${entry.id}</td>`;
                    output += `<td>${entry.topic}</td>`;
                    output += `<td>${entry.roomName}</td>`;
                    output += `<td>${entry.date}</td>`;
                    output += `<td>${entry.time}${entry.endTime ? ' - ' + entry.endTime : ''}</td>`;
                    output += `<td style="color: ${color}; font-weight: bold;">${entry.status}</td>`;
                    output += `<td>${entry.source || 'unknown'}</td>`;
                    output += `</tr>`;
                });
                output += '</table>';
            }
            
            document.getElementById('output').innerHTML = output;
        }

        // Initial display
        displayHistory();

        // Add button to move expired bookings
        const button = document.createElement('button');
        button.textContent = 'Move Expired to History';
        button.onclick = () => {
            moveExpiredToHistory();
            displayHistory(); // Refresh display
        };
        button.style.margin = '10px';
        button.style.padding = '10px 20px';
        button.style.backgroundColor = '#007bff';
        button.style.color = 'white';
        button.style.border = 'none';
        button.style.borderRadius = '5px';
        button.style.cursor = 'pointer';
        
        document.body.appendChild(button);
    </script>
</body>
</html>
